name: Build APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v2

    - name: Install dependencies
      run: npm install

    - name: Build frontend
      run: cd frontend && npm run build

    - name: Install Capacitor dependencies
      run: |
        cd frontend
        npm install @capacitor/core @capacitor/cli --no-audit --no-fund

    - name: Add Android platform if missing
      run: |
        cd frontend
        if [ ! -d "android" ]; then
          npx cap add android --no-interactive || true
        else
          echo "android platform already present"
        fi

    - name: Sync Capacitor
      run: |
        cd frontend
        npx cap sync android --no-interactive || true

    - name: Build APK with Gradle
      run: cd frontend/android && ./gradlew assembleDebug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v3
      with:
        name: app-debug.apk
        path: frontend/android/app/build/outputs/apk/debug/app-debug.apk

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: Release v${{ github.run_number }}
        body: "Automated APK build from commit ${{ github.sha }}"

    - name: Upload Release Asset
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
        asset_name: DoaKu-v${{ github.run_number }}.apk
        asset_content_type: application/vnd.android.package-archive
